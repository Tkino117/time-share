<!DOCTYPE html>

  <style>

  /* マイページボタン (ヘッダーのユーザーアイコン) */
  #mypage-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff; /* 白い枠線 */
      transition: box-shadow 0.2s ease-in-out;
      position: absolute;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
    }
    #mypage-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 画像がコンテナに収まるようにトリミング */
    }
    /* ヘッダーのd-flexコンテナ (重要: position: relative; が必要) */
    header #container > .d-flex {
      /* justify-content-between を削除し、個別の要素で位置を調整 */
      align-items: center; /* 垂直方向中央揃え */
      padding: 0 15px; /* 左右のパディング */
      position: relative; /* ← これが重要！ */
    }



    /* イベント名入力欄の吹き出しスタイル */
    .title-bubble {
      display: none; 
      position: absolute; 
      background-color: #f8f9fa; /* 背景色 */
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0.1, 0.1, 0.1, 0.1);
      padding: 0px; 
      z-index: 1050; 
      min-width: 250px; 
      transform: translateX(-50%);
      max-width: 800px;
      height: 130px;
      left: -9999px; 
      top: -9999px;
    }

    /* 吹き出し内のタイトルのスタイル調整 */
    .title-bubble .bubble-content p {
      font-weight: bold;
      background-color: #00ced1;
      color: white;
      padding: 10px 0;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;

    }

    .preset-event-btn:hover {
      background-color: #30898c;
      border-color: #30898c;

    }

    <div class="modal fade" id="addEventModal" tabindex="-1" aria-labelledby="addEventModalLabel" aria-hidden="true">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/locales-all.min.js"></script>
  <script type="module">
    // util.jsから必要な関数をインポート
    import { getMyUserId, post, get, log, getApiUrl } from './util.js';

    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const addEventModal = new bootstrap.Modal(document.getElementById('addEventModal'));
      let selectedRange = null;

      const logoutBtn = document.getElementById('logout-btn').querySelector('button');
      const base_url = getApiUrl(); // util.jsから取得するように変更

      // --- ランキング機能関連の変数宣言をここに移動 ---
      // selectedPresetType はここで一度だけ定義します。
      const titleInput = document.getElementById('eventTitle'); // ★修正: IDを'eventTitle'に
      const titleInputBubble = document.getElementById('titleInputBubble');
      const closeBubbleBtn = document.getElementById('closeBubbleBtn');
      const rankingCloseBtn = document.querySelector('.btn-close-ranking');
      const presetEventBtns = document.querySelectorAll('.preset-event-btn');
      let selectedPresetType = null; // ここで定義することで、submitリスナーからもアクセス可能になります

      // --- イベントの取得 ---
      async function fetchEvents() {
          try {
              const currentUserId = await getMyUserId();
              if (!currentUserId) {
                  console.error('ユーザーIDが取得できませんでした。イベントの取得をスキップします。');
                  return [];
              }
              const response = await get(`/api/users/${currentUserId}/events`);

              if (response.ok) {
                  const result = await response.json();
                  if (result.success) {
                      const events = result.data.events.map(event => ({
                          id: event.id,
                          title: event.name,
                          start: event.startTime,
                          end: event.endTime,
                          allDay: false,
                          type: event.type // ★追加: イベントタイプをFullCalendarイベントに含める
                      }));
                      return events;
                  } else {
                      console.error('イベント取得失敗:', result.message);
                      return [];
                  }
              } else if (response.status === 401) {
                  window.location.href = '/login.html';
                  return [];
              } else {
                  console.error('サーバーエラー:', response.status);
                  return [];
              }
          } catch (error) {
              console.error('ネットワークエラー:', error);
              return [];
          }
      }

      // --- FullCalendarの初期化とイベント設定 ---
      const calendar = new FullCalendar.Calendar(calendarEl, {
          locale: 'ja',
          initialView: 'dayGridMonth',
          selectable: true,
          headerToolbar: {
              left: 'prev,next today',
              center: 'title',
              right: 'dayGridMonth,timeGridWeek,timeGridDay',
          },
          dateClick: function (info) {
              calendar.changeView('timeGridDay', info.dateStr);
          },
          select: function(info) {
              const viewType = calendar.view.type;
              if (viewType === 'timeGridDay' || viewType === 'timeGridWeek') {
                  selectedRange = info;
                  document.getElementById('eventStart').value = info.startStr.slice(0, 16);
                  document.getElementById('eventEnd').value = info.endStr.slice(0, 16);
                  document.getElementById('eventTitle').value = '';
                  titleInput.disabled = false; // ★追加: select時にdisabledを解除
                  selectedPresetType = null; // ★追加: select時にselectedPresetTypeをリセット
                  addEventModal.show();
              }
          },
          eventClick: async function (info) {
              if (confirm(`予定「${info.event.title}」を削除しますか？`)) {
                  try {
                    const eventId = info.event.id;
                    const response = await fetch(`/api/events/${eventId}`, { method: 'DELETE' });

                      if (response.ok) {
                          const result = await response.json();
                          if (result.success) {
                              info.event.remove();
                          } else {
                              alert(`イベント削除失敗: ${result.message}`);
                          }
                      } else {
                          alert('イベント削除中にエラーが発生しました。');
                      }
                  } catch (error) {
                      console.error('ネットワークエラー:', error);
                      alert('イベント削除中にエラーが発生しました。');
                  }
              }
          },
          events: async function (fetchInfo, successCallback, failureCallback) {
              const events = await fetchEvents();
              successCallback(events);
          }
      });

      calendar.render();

      // --- 予定追加フォームの送信処理 ---
      document.getElementById('addEventForm').addEventListener('submit', async function (e) {
          e.preventDefault();
          const title = document.getElementById('eventTitle').value.trim();
          const startTimeLocal = document.getElementById('eventStart').value;
          const endTimeLocal = document.getElementById('eventEnd').value;
          const description = ''; // month.htmlにはdescription入力欄がないため空文字列をセット

          if (title && startTimeLocal && endTimeLocal) {
              const startTime = new Date(startTimeLocal).toISOString();
              const endTime = new Date(endTimeLocal).toISOString();

              const payload = {
                  name: title,
                  startTime: startTime,
                  endTime: endTime,
                  description: description // descriptionを追加
                  // type: 'other' // これは後続のif文で設定されるため不要
              };

              // ★修正: payloadオブジェクトが定義された後にtypeを追加
              if (selectedPresetType) {
                  payload.type = selectedPresetType;
              } else {
                  // プリセットが選択されていない場合のデフォルトタイプを設定
                  payload.type = 'other'; 
              }

              try {
                  const response = await post('/api/events', payload);

                  if (response.ok) {
                      const result = await response.json();
                      if (result.success) {
                          calendar.addEvent({
                              id: result.data.id,
                              title: title,
                              start: result.data.startTime,
                              end: result.data.endTime,
                              allDay: false,
                              type: payload.type // ★追加: typeもFullCalendarイベントに含める
                          });
                          addEventModal.hide();
                          calendar.unselect();
                          this.reset();
                      } else {
                          alert(`イベント追加失敗: ${result.message}`);
                      }
                  } else {
                      const errorData = await response.json(); // エラーレスポンスを解析
                      alert('イベント追加中にエラーが発生しました: ' + errorData.message);
                  }
              } catch (error) {
                  console.error('ネットワークエラー:', error);
                  alert('ネットワークエラーが発生しました。');
              }
          } else {
              alert('予定名、開始日時、終了日時をすべて入力してください。');
          }
      });

      // ログアウトボタンがクリックされた時に実行される処理
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async function() {
          console.log("Logout button clicked.");
          try {
              const response = await post("/api/auth/logout", {});
              const data = await response.json();
              if (data.success) {
                console.log("Logout successful, redirecting.");
                window.location.href = 'TimeShare_WelcomePage.html';
              } else {
                alert('ログアウトに失敗しました');
                console.error("Logout failed:", data.message);
              }
          } catch (error) {
              console.error('ログアウト中にエラーが発生しました:', error);
              alert('ログアウトに失敗しました。再度試してください。');
          }
        });
      } else {
        console.error("Error: logoutButton element not found.");
      }

      // --- 吹き出し関連のJavaScriptコード ---
      // 変数宣言はDOMContentLoadedの先頭に移動済み

      if (titleInput) {
        titleInput.addEventListener('focus', function() {
          const inputRect = titleInput.getBoundingClientRect();
          const modalBody = document.querySelector('#addEventModal .modal-body');
          const modalBodyRect = modalBody.getBoundingClientRect();

          titleInputBubble.style.left = `${inputRect.left - modalBodyRect.left + (inputRect.width / 2)}px`;
          titleInputBubble.style.top = `${inputRect.bottom - modalBodyRect.top + 10}px`;
          titleInputBubble.style.display = 'block';
        });
      }

      if (closeBubbleBtn) {
        closeBubbleBtn.addEventListener('click', function(event) {
          event.preventDefault();
          titleInputBubble.style.display = 'none';
        });
      }

      if (rankingCloseBtn) {
        rankingCloseBtn.addEventListener('click', function() {
          titleInputBubble.style.display = 'none';
        });
      }

      if (presetEventBtns.length > 0) {
        presetEventBtns.forEach(button => {
          button.addEventListener('click', function() {
            const eventName = this.dataset.eventName;
            titleInput.value = eventName;
            titleInput.disabled = true;
            titleInputBubble.style.display = 'none';

            if (eventName === "食事") {
              selectedPresetType = "meal";
            } else if (eventName === "睡眠") {
              selectedPresetType = "sleep";
            } else if (eventName === "仕事") {
              selectedPresetType = "work";
            } else if (eventName === "運動") {
              selectedPresetType = "exercise";
            } else if (eventName === "勉強") {
              selectedPresetType = "study";
            } else {
              selectedPresetType = null;
            }
          });
        });
      }

      const eventForm = document.getElementById('addEventForm');
      if (eventForm) {
        eventForm.addEventListener('reset', function() {
          if (titleInputBubble) titleInputBubble.style.display = 'none';
          if (titleInput) titleInput.disabled = false;
          selectedPresetType = null; // リセット時にselectedPresetTypeもクリア
        });
      }

      // フォーム、入力欄、バブル以外の場所をクリックしたらバブルを閉じる
      document.addEventListener('click', function(event) {
        // addEventModalが現在表示されている場合のみ処理を行う
        const addEventModalElement = document.getElementById('addEventModal');
        const isModalOpen = addEventModalElement ? addEventModalElement.classList.contains('show') : false;

        if (isModalOpen && titleInput && titleInputBubble && eventForm) {
          // クリックされた要素が titleInput でも、titleInputBubble 内でも、
          // addEventModal (フォーム全体を含む) 内でもない場合、バブルを閉じる
          if (event.target !== titleInput && !titleInputBubble.contains(event.target) && !addEventModalElement.contains(event.target)) {
            titleInputBubble.style.display = 'none';
          }
        }
      });
    }); // 最初のDOMContentLoadedの閉じカッコ

// DOMContentLoaded イベントリスナー内でユーザーアイコンを更新する部分 (これは別のブロックなのでそのまま)
document.addEventListener('DOMContentLoaded', async function() {
  const headerUserIcon = document.getElementById('user-icon');
  const defaultIcon = 'uploads/avatars/default-avatar.png'; 

  try {
    const currentUserId = await getMyUserId();
    if (!currentUserId) {
      console.warn('ユーザーIDが取得できませんでした。');
      headerUserIcon.src = defaultIcon;
      return; 
    }

    const userMeResponse = await get('/api/users/me');
    let userData = null;

    if (userMeResponse.ok && userMeResponse.status !== 204) {
      const userMeResult = await userMeResponse.json();
      if (userMeResult.success && userMeResult.data) {
        userData = userMeResult.data;
      }
    }

    const profileImageUrl = userData && userData.profileImageUrl 
                            ? `${getApiUrl()}${userData.profileImageUrl}` 
                            : defaultIcon;
    if (headerUserIcon) {
        headerUserIcon.src = profileImageUrl;
    }

  } catch (error) {
    console.error('ユーザーアイコンの読み込み中にエラーが発生しました:', error);
    if (headerUserIcon) {
        headerUserIcon.src = defaultIcon;
    }
  }
});

</script>
</body>
</html>
