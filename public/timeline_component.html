<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      background-color: transparent;
    }

    .timeline {
      position: relative;
      width: 100%;
      height: 50px;
    }

    .line {
      position: absolute;
      top: 3.5px;
      left: 0;
      right: 0;
      height: 2px;
      background-color: black;
    }

    .tick {
      position: absolute;
      top: 0;
      width: 2.5px;
      height: 10px;
      background-color: black;
    }

    .label {
      position: absolute;
      top: 15px;
      font-size: 12px;
      font-family: "游ゴシック", "Yu Gothic", "メイリオ", Meiryo, sans-serif;
      font-weight: bold;
      /* テキストの左端ではなく中央基準に */
      transform: translateX(-50%);
    }

    /* ラベル位置調整：tickの中央に合わせる */
    .t0   { left: 0%;  }
    .t3   { left: 12.5%; }
    .t6   { left: 25%; }
    .t9   { left: 37.5%; }
    .t12  { left: 50%; }
    .t15  { left: 62.5%; }
    .t18  { left: 75%; }
    .t21  { left: 87.5%; }
    .t24  { left: 100%; }

  </style>
</head>
<body>
  <div class="timeline">
    <div class="line"></div>

    <div class="tick t0"></div>
    <div class="label t0">0</div>

    <div class="tick t3"></div>
    <div class="label t3">3</div>

    <div class="tick t6"></div>
    <div class="label t6">6</div>

    <div class="tick t9"></div>
    <div class="label t9">9</div>

    <div class="tick t12"></div>
    <div class="label t12">12</div>

    <div class="tick t15"></div>
    <div class="label t15">15</div>

    <div class="tick t18"></div>
    <div class="label t18">18</div>

    <div class="tick t21"></div>
    <div class="label t21">21</div>

    <div class="tick t24"></div>
    <div class="label t24">24</div>
  </div>
</body>
</html>
