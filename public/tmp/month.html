<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TimeShare-CalenderPage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css" rel="stylesheet" />
  <style>
    body {
      background: #F5F5F5;
      margin: 0;
      font-family: "游ゴシック体", "Yu Gothic", sans-serif;
    }
    header {
      padding-bottom: 0px;
    }
    .rounded-box {
      border-radius: 0; /* 全体の丸みをなくす */
      border-top-left-radius: 0;   /* 左上の丸みをなくす */
      border-top-right-radius: 0;  /* 右上の丸みをなくす */
      border-bottom-left-radius: 15px; /* 下は元の丸みを残す場合 */
      border-bottom-right-radius: 15px; /* 下は元の丸みを残す場合 */

      background-color: #f8f9fa;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-top: -5px !important; /* これは以前の調整のまま残します */
      padding-top: 0 !important;   /* これも以前の調整のまま残します */
    }
    .rounded-left {
      border-top-left-radius: 15px !important;
    }
    .rounded-right {
      border-top-right-radius: 15px !important;
    }
    .rounded-box .btn-group {
      margin-top: 0 !important;
      margin-bottom: 0 !important; /* 下部も念のため設定 */
      padding-top: 0 !important;
      padding-bottom: 0 !important; /* 下部も念のため設定 */
    }
    .custom-btn {
      border-radius: 0;
      background-color: #00ced1;
      border-color: #00ced1;
      color: white;
      font-weight: bold;
      padding: 0.5rem 0;
    }
    .btn img {
      height: 2rem;
      width: auto;
    }
    .site-title {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      color: white;
    }
    #logout-btn{
      position: absolute;
      right: 35px;
      top: 5px;
    }
    #logout-btn button {
      background-color: #26B2B4;
      border-color: #20b2aa;
      color: white;
      font-size: 0.8rem;
    }
    .logo-img {
      height: 2.5rem;
      width: auto;
    }
    .btn-group {
      display: flex;
      width: 100%;
      margin-bottom: 0 !important;
      margin-top: 0;
    }
    .btn-group > .btn {
      flex: 1; /* 各ボタンを均等に広げる */
      margin: 0; /* ボタン同士の隙間をゼロに */
      padding: 0.8rem 0; /* 高さ調整 */
      background-color: #00ced1;
      border-color: #00ced1;
      color: white;
      font-weight: bold;
      transition: background-color 0.3s ease;
      position: relative;
    }
    /* ホバー時のボタン色 */
    .custom-btn:hover,
    .btn-group > .btn:hover {
      background-color: #26B2B4;
      border-color: #20b2aa;
      color: white;
    }
    .btn-group > .btn:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 0%; /* 線の開始位置を調整 */
      right: 0;
      width: 1px;
      height: 100%; /* 線の高さを調整 */
      background-color: white ;
    }

    #container {
      background: #00ced1;
      border-bottom: 2px #5f9ea0;
      padding: 10px 0;     
    }
    .main-container {
      margin-top: -8px; /* ここで余白の幅を調整します。例: 10px */
    }
    section.container {
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }
    #calendar {
      max-width: 900px;
      margin: 20px auto;
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin-top: 5px;
      margin-bottom: 5px;
    }
    section.container {
      padding-top: 0 !important;
    }

    .rounded-box {
      margin-top: -5 !important;
      padding-top: 0 !important; 
    }
    .fc-toolbar-title {
      text-align: center;
      position: relative; /* relativeに設定することでleftプロパティが有効になる */
      left: -14%;
      font-weight: bold;
      font-size: 25px !important;
    }

    /* 土曜日の日付 */
    .fc-daygrid-day.fc-day-sat .fc-daygrid-day-number {
      color: #30898c;
    }

    /* 日曜日の日付 */
    .fc-daygrid-day.fc-day-sun .fc-daygrid-day-number {
      color: #4DDBDE;
    }

    /* 平日の日付 */
    .fc-daygrid-day:not(.fc-day-sat):not(.fc-day-sun) .fc-daygrid-day-number {
      color: rgb(69, 68, 68); /* 平日を黒にする場合 */
    }
    .fc-event-title {
      color: rgb(69, 68, 68); /* イベントの文字色を白に設定 */
    }
    .fc-timegrid-slot-label-cushion {
      color: #333 !important; /* 例: 濃い灰色 */
    }
    /* リストビューなどのイベントドット */
    .fc-list-event-dot {
      color: #00ced1 !important; /* 例: メインカラーと同じ色 */
    }

    /* 月表示などのイベントドット */
    .fc-daygrid-event-dot {
     color: #00ced1 !important; /* 例: メインカラーと同じ色 */
    }
    .fc-event-time {
      color: #58595a !important;
    }
    .fc-daygrid-event-dot{
      border: calc(var(--fc-daygrid-event-dot-width,8px)/ 2) solid var(--fc-event-border-color,#30898c);
    }

    .fc-day-today {
      background-color: #c6f5f6 !important; /* 例: #D8F2F3 */
    }
    .fc-prev-button.fc-button-primary{
      background-color: #30898c;
      border-color: #30898c;
    }
    .fc-prev-button.fc-button-primary:hover{
      background-color: #25686a;
      border-color: #25686a;
    }
    .fc-next-button.fc-button-primary{
      background-color: #30898c;
      border-color: #30898c;
    }
    .fc-next-button.fc-button-primary:hover{
      background-color: #25686a;
      border-color: #25686a;
    }
    .fc-today-button.fc-button.fc-button-primary{
      background-color: #30898c;
      border-color: #30898c;
    }
    .fc-today-button.fc-button.fc-button-primary:hover{
      background-color: #25686a;
      border-color: #25686a;
    }
    .fc-dayGridMonth-button.fc-button.fc-button-primary.fc-button-active{
      background-color: #30898c !important;
      border-color: #30898c !important;
    }
    .fc-dayGridMonth-button.fc-button.fc-button-primary.fc-button-active:hover{
      background-color: #25686a !important;
      border-color: #25686a !important;
    }
    .fc-dayGridMonth-button.fc-button.fc-button-primary{
      background-color: #30898c !important;
      border-color: #30898c !important;
    }
    .fc-dayGridMonth-button.fc-button.fc-button-primary:hover{
      background-color: #25686a !important;
      border-color: #25686a !important;
    }
    .fc-timeGridWeek-button.fc-button.fc-button-primary{
      background-color: #30898c !important;
      border-color: #30898c !important;
    }
    .fc-timeGridWeek-button.fc-button.fc-button-primary:hover{
      background-color: #25686a !important;
      border-color: #25686a !important;
    }
    
    .fc-timeGridDay-button.fc-button.fc-button-primary{
      background-color: #30898c !important;
      border-color: #30898c !important;
    }
    .fc-timeGridDay-button.fc-button.fc-button-primary:hover{
      background-color: #25686a !important;
      border-color: #25686a !important;
    }
    .fc-col-header {
      background-color: #00ced1 !important;
    }
    .fc-col-header-cell-cushion {
      color: white !important;
    }
    .fc-dayGridMonth-view .fc-event-time {
      color: #58595a !important; /* 文字色も忘れずに設定 */
    }
    .fc-timeGridWeek-view .fc-event-time,
    .fc-timeGridDay-view .fc-event-time {
      background-color: #00ced1 !important;
      border-color: #00ced1 !important;
      color: white !important; 
    }
    .fc-event-title-container{
      background-color: white !important;
      border-color: #00ced1 !important;
    }
    .fc-timegrid-event.fc-v-event.fc-event.fc-event-start.fc-event-end.fc-event-past{
      border-color: #00ced1 !important;
    }
    .fc-timegrid-event .fc-event-time{
      border-color: #00ced1 !important;
    }
    .fc-timegrid-event.fc-v-event.fc-event.fc-event-start.fc-event-end.fc-event-today.fc-event-future{
      border-color: #00ced1 !important;
    }
    .modal-header{
      background-color: #00ced1 !important;
      color: white !important; 
      margin-top: 0px;
    }
    .modelcontent{
      border-top-left-radius: 0 !important;
      border-top-right-radius: 0 !important;
    }
    .btn.btn-primary{
      background-color: #00ced1 !important;
      border-color: #00ced1;
      color: white !important; 
    }
    a.fc-daygrid-day-number {
      text-decoration: none !important;
    }
    a.fc-col-header-cell-cushion {
      text-decoration: none !important;
    }
  </style>
</head>
<body>
  <header>
    <div id="container">
      <br>
      <div class="d-flex justify-content-center align-items-center px-3 position-relative">
        <h1 class="site-title d-flex align-items-center m-0">
          <img src="https://i.ibb.co/JbLxZxR/MN-logo.png" alt="Logo" class="logo-img me-2">
          <span>TimeShare</span>
        </h1>
        <div id="logout-btn">
          <button class="btn btn-light fw-bold">ログアウト</button>
        </div>
      </div>
      <br>
    </div>
  </header>

  <section class="container main-container">
    
        <div class="btn-group" role="group" aria-label="Button group">
          <button type="button" class="btn custom-btn rounded-left" onclick="location.href='/home.html'">
            <img src="https://i.ibb.co/ksPtmchD/IMG-9894.png" alt="Home Icon">
          </button>
          <button type="button" class="btn custom-btn"  onclick="location.href='/month.html'">
            <img src="https://i.ibb.co/ynBwyqzY/image.png" alt="Month Icon">
          </button>
          <button type="button" id="searchButton" class="btn custom-btn"  onclick="location.href='/search.html'">
            <img src="https://i.ibb.co/8nTNjkQy/IMG-9899.png">
          </button>
          <button type="button" id="rankingButton" class="btn custom-btn"  onclick="location.href='/ranking.html'">
            <img src="https://i.ibb.co/cKCDDhY5/IMG-9902.png" alt="Icon">
          </button>
          <button type="button" class="btn custom-btn rounded-right">
            <img src="https://i.ibb.co/GQm5NFDm/IMG-9904.png" alt="Notification Icon">
          </button>
        </div>
      <div class="rounded-box">
    
      <div id="calendar"></div>
    </div>
  </section>

    <div class="modal fade" id="addEventModal" tabindex="-1" aria-labelledby="addEventModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        
        <form id="addEventForm">
          <div class="modal-header">
            <h5 class="modal-title" id="addEventModalLabel">予定追加</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
          </div>
          <div class="modal-content">
          <div class="modal-body">
            <div class="mb-3">
              <label for="eventTitle" class="form-label">予定名</label>
              <input type="text" class="form-control" id="eventTitle" required />
            </div>
            <div class="mb-3">
              <label for="eventStart" class="form-label">開始日時</label>
              <input type="datetime-local" class="form-control" id="eventStart" required />
            </div>
            <div class="mb-3">
              <label for="eventEnd" class="form-label">終了日時</label>
              <input type="datetime-local" class="form-control" id="eventEnd" required />
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary">追加</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          </div>
        </form>
        </div>
        
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/locales-all.min.js"></script>
  <script type="module">
    import { getApiUrl } from "./util.js";
    const base_url = getApiUrl();

    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const addEventModal = new bootstrap.Modal(document.getElementById('addEventModal'));
      let selectedRange = null;

      const logoutBtn = document.getElementById('logout-btn').querySelector('button'); // ログアウトボタン

      // --- イベントの取得 ---
      async function fetchEvents() {
          try {
              const response = await fetch('/api/users/me/events', {
                  method: 'GET',
                  headers: {
                      'Content-Type': 'application/json',
                  },
              });

              if (response.ok) {
                  const result = await response.json();
                  if (result.success) {
                      // FullCalendarのイベント形式に変換
                      const events = result.data.events.map(event => ({
                          id: event.id, // イベントIDを保持
                          title: event.name,
                          start: event.startTime,
                          end: event.endTime,
                          allDay: false, // 必要に応じて変更
                          // type: event.type // イベントタイプも持たせる場合は追加
                      }));
                      return events;
                  } else {
                      console.error('イベント取得失敗:', result.message);
                      return [];
                  }
              } else if (response.status === 401) {
                  // 未認証の場合はログインページへ
                  window.location.href = '/login.html'; // 仮のログインページ
                  return [];
              } else {
                  console.error('サーバーエラー:', response.status);
                  return [];
              }
          } catch (error) {
              console.error('ネットワークエラー:', error);
              return [];
          }
      }

      // --- FullCalendarの初期化とイベント設定 ---
      const calendar = new FullCalendar.Calendar(calendarEl, {
          locale: 'ja',
          initialView: 'dayGridMonth',
          selectable: true,
          headerToolbar: {
              left: 'prev,next today',
              center: 'title',
              right: 'dayGridMonth,timeGridWeek,timeGridDay',
          },
          dateClick: function (info) {
              // 日付クリック時はtimeGridDayに切り替え
              calendar.changeView('timeGridDay', info.dateStr);
          },
          select: function(info) {
              // 現在のビュー名を取得
              const viewType = calendar.view.type;
              // timeGridDay または timeGridWeek で選択したときにモーダルを表示
              if (viewType === 'timeGridDay' || viewType === 'timeGridWeek') {
                  selectedRange = info;
                  document.getElementById('eventStart').value = info.startStr.slice(0, 16);
                  document.getElementById('eventEnd').value = info.endStr.slice(0, 16);
                  document.getElementById('eventTitle').value = '';
                  addEventModal.show();
              }
          },
          eventClick: async function (info) {
              // 予定クリックで削除確認
              if (confirm(`予定「${info.event.title}」を削除しますか？`)) {
                  try {
                      const eventId = info.event.id; // イベントIDを取得
                      const response = await fetch(`/api/events/${eventId}`, {
                          method: 'DELETE',
                          headers: {
                              'Content-Type': 'application/json',
                          },
                      });

                      if (response.ok) {
                          const result = await response.json();
                          if (result.success) {
                              info.event.remove(); // フロントエンドから削除
                          } else {
                              alert(`イベント削除失敗: ${result.message}`);
                          }
                      } else {
                          alert('イベント削除中にエラーが発生しました。');
                      }
                  } catch (error) {
                      console.error('ネットワークエラー:', error);
                      alert('イベント削除中にエラーが発生しました。');
                  }
              }
          },
          // イベントを動的に取得するための関数として定義
          events: async function (fetchInfo, successCallback, failureCallback) {
              const events = await fetchEvents();
              successCallback(events);
          }
      });

      calendar.render();

      // --- 予定追加フォームの送信処理 ---
      document.getElementById('addEventForm').addEventListener('submit', async function (e) {
          e.preventDefault();
          const title = document.getElementById('eventTitle').value.trim();
          const start = document.getElementById('eventStart').value;
          const end = document.getElementById('eventEnd').value;

          if (title && start && end) {
              try {
                  const response = await fetch('/api/events', {
                      method: 'POST',
                      headers: {
                          'Content-Type': 'application/json',
                      },
                      body: JSON.stringify({
                          name: title,
                          startTime: start + ':00.000Z', // ISO 8601形式に合わせる
                          endTime: end + ':00.000Z',     // ISO 8601形式に合わせる
                          type: 'other' // 仮のタイプ。バックエンドの要件に合わせて設定
                      }),
                  });

                  if (response.ok) {
                      const result = await response.json();
                      if (result.success) {
                          calendar.addEvent({ // FullCalendarにイベントを追加
                              id: result.data.id,
                              title: result.data.name,
                              start: result.data.startTime,
                              end: result.data.endTime,
                              allDay: false,
                          });
                          addEventModal.hide();
                          calendar.unselect();
                          this.reset();
                          alert(result.message); // 成功メッセージ表示
                      } else {
                          alert(`イベント追加失敗: ${result.message}`);
                      }
                  } else {
                      alert('イベント追加中にエラーが発生しました。');
                  }
              } catch (error) {
                  console.error('ネットワークエラー:', error);
                  alert('イベント追加中にエラーが発生しました。');
              }
          }
      });


      // ログアウトボタンがクリックされた時に実行される処理
  if (logoutBtn) { // nullチェック
    logoutBtn.addEventListener('click', function() {
      console.log("Logout button clicked."); // ログ追加
      fetch(base_url + "/api/auth/logout", {
        method: 'POST',
        credentials: 'include'
      })
        .then(response => {
          console.log("Logout response received.", response); // ログ追加
          return response.json();
        })
        .then(data => {
          if (data.success) {
            console.log("Logout successful, redirecting."); // ログ追加
            window.location.href = 'TimeShare_WelcomePage.html';
          } else {
            alert('ログアウトに失敗しました');
            console.error("Logout failed:", data.message); // ログ追加
          }
        })
        .catch(error => {
          console.error('ログアウト中にエラーが発生しました:', error);
          alert('ログアウトに失敗しました。再度試してください。');
        });
    });
  } else {
