<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeShare-HomePage</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    header {
      padding-bottom: 40px;
    }

    body {
      background: #F5F5F5;
      margin: 0;
      padding: 0;
      font-family: "游ゴシック体", "Yu Gothic", sans-serif;
    }

    /* 角を丸めた四角のスタイル */
    .rounded-box {
      border-radius: 15px;
      padding: 0 0px 0px 0px;
      background-color: #f8f9fa;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    /* カスタムボタン */
    .custom-btn {
      border-radius: 0;
      background-color: #00ced1;
      border-color: #00ced1;
      color: white;
      font-weight: bold;
      padding: 0.5rem 0;
      transition: background-color 0.3s ease;
    }

    /* ボタン画像のサイズ調整 */
    .btn img {
      height: 2rem;
      width: auto;
    }

    .site-title {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      color: white;
    }

    #logout-btn{
      position: absolute;
      right: 35px;
      top: 5px;
    }

    #logout-btn button {
      background-color: #26B2B4;
      border-color: #20b2aa;
      color: white;
      font-size: 0.8rem;
    }

    #logout-btn button:hover {
      background-color: #40999A;
      border-color: #40999A;
      border-color: #40999A;
    }

    .logo-img {
      height: 2.5rem; /* 画像の高さ（調整可能） */
      width: auto;
      border-color: #20b2aa;
    }

    /* ボタンが均等に並ぶように */
    .btn-group {
      display: flex;
      width: 100%;
    }

    .btn-group > .btn {
      flex: 1; /* 各ボタンを均等に広げる */
      margin: 0; /* ボタン同士の隙間をゼロに */
      padding: 0.8rem 0; /* 高さ調整 */
      background-color: #00ced1;
      border-color: #00ced1;
      color: white;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .btn-group > .btn:not(:last-child)::after {/* ボタン同士の隙間に白いラインを入れる*/
      content: "";
      position: absolute;
      top: 0%;
      right: 0;
      width: 1px;
      height: 100%;
      background-color: white;
    }

    /* ホバー時のボタン色 */
    .custom-btn:hover,
    .btn-group > .btn:hover {
      background-color: #26B2B4;
      border-color: #20b2aa;
      color: white;
    }

    #container {
      background: #00ced1;
      font-size: 1em;
      border-bottom: 2px #5f9ea0;
      padding: 10px 0;
      
    }

    /* 左上端と右上端を丸める */
    .rounded-left {
      border-top-left-radius: 15px !important;
    }
    .rounded-right {
      border-top-right-radius: 15px !important;
    }

    .timeline-wrapper {
      display: flex;
      align-items: center;
      justify-content: center; /* 中央寄せ */
      width: 100%;
      flex-grow: 1;
      flex-shrink: 0;
      min-width: 200px;
    }
    #today-date{
      font-weight: bold;
      font-size: 20px;
      
    }
    #prev-day-btn {
      font-size: 25px;
    }
    #next-day-btn {
      font-size: 25px;
    }

    .label {
      margin-right: 10px;
      font-weight: bold;
      white-space: nowrap;
      font-size: 12px;
    }

    .timeline-iframe-container {
      width: 81.5%; /* iframeの表示幅（例: 親要素の80%） */
      margin-left: 9%;   /* 左側の余白を親要素の5%に設定 */
      margin-right: 9%; /* 右側の余白を親要素の15%に設定 */
  
    }

    .timeline {
      position: relative;
      width: 80%;
      aspect-ratio: 5 / 1;
      background-color: white;
    }
    .timeline.has-placeholder-image {
      background-image: url('https://i.ibb.co/Lzn1192z/image.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      border: none; /* 画像表示中は枠線を非表示にする */
    }
    
    .event {
      position: absolute;
      height: 100%;
      background-color: #00ced1;
      color: white;
      text-align: center;
      font-size: 15px;
      overflow: hidden;
      border: 2px solid #00ced1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    #eventForm {
      display: flex;
      align-items: center;
      justify-content: center; /* 横方向に中央寄せ */
      position: relative;
    }
    #title {
      width: 100px;
    }
    #eventForm input, #eventForm select {

    }
    #eventForm button{

    }

    #create-event-btn{
      background-color: #26B2B4;
      color: white;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      
    }
    #submit:hover{

    }

    .modal-content {

    }
    .modal-header {
      background-color: #00ced1;
      color: white;
    }
    .modal-footer {
      background-color: #f5f5f5;
    }

    .color-option {

      height: 30px; /* お好みの高さ */
      border-radius: 5px; /* 少し角を丸める */
    }

    /* 虹色ボタン専用のスタイル */
    .custom-color-button {

    /* input type="color" のスタイルはそのまま */

      width: 100%;

    }

    .followed-username {
      font-size: 1em;
      color: black;
    
    }
    .san-suffix {
    font-size: 0.6em; 
    color: #58595a;
    white-space: nowrap; /* 常に折り返さない */
    flex-shrink: 0;
  }

  </style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
  const base_url = "http://localhost:3500"; 

  const eventColors = [
    '#30898c', // 00:00 - 02:59
    '#40999A', // 03:00 - 05:59
    '#00ced1', // 06:00 - 08:59
    '#80E7E9', // 09:00 - 11:59
    '#4DDBDE', // 12:00 - 14:59
    '#26B2B4', // 15:00 - 17:59
    '#40999A', // 18:00 - 20:59
    '#30898c'  // 21:00 - 23:59
  ];

  function populateTimeOptions(hourSelectId, minuteSelectId) {
    const hourSelect = document.getElementById(hourSelectId);
    const minuteSelect = document.getElementById(minuteSelectId);

    for (let i = 0; i < 24; i++) {
      const option = document.createElement("option");
      option.value = String(i).padStart(2, '0');
      option.textContent = String(i).padStart(2, '0');
      hourSelect.appendChild(option);
    }

    for (let i = 0; i < 60; i++) {
      const option = document.createElement("option");
      option.value = String(i).padStart(2, '0');
      option.textContent = String(i).padStart(2, '0');
      minuteSelect.appendChild(option);
    }
  }

  function toMinutes(t) {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
  }

  function getEventColorByMidpoint(startMinutes, endMinutes) {
    const midMinutes = (startMinutes + endMinutes) / 2;
    const segmentIndex = Math.floor(midMinutes / (3 * 60));
    return eventColors[Math.min(segmentIndex, eventColors.length - 1)];
  }

  async function fetchMyEvents(loggedInUserId, timelineElement, eventDetailModalInstance, eventDetailTextElement, currentEventRefObject, targetDate) {
    try {
      const response = await fetch(base_url + "/api/users/me/events", {
        method: "GET",
        headers: { "Content-Type": "application/json" },
        credentials: 'include'
      });

      const result = await response.json();

      if (result.success) {
        console.log("ログインユーザーのイベント取得成功:", result.data.events);
        timelineElement.innerHTML = ''; // 既存のイベントをクリア

        // ターゲット日付を取得 (ローカルタイムゾーン基準で年、月、日を取得)
        const targetYear = targetDate.getFullYear();
        const targetMonth = targetDate.getMonth();
        const targetDay = targetDate.getDate();

        // 今日のイベントのみをフィルター
        const targetEvents = result.data.events.filter(eventData => {
          const eventStartTime = new Date(eventData.startTime);
    
          // イベントの開始時刻が今日の日付と同じかチェック (ローカルタイムゾーン基準で比較)
          return eventStartTime.getFullYear() === targetYear &&  // getUTCFullYear() から getFullYear() に変更
                 eventStartTime.getMonth() === targetMonth &&    // getUTCMonth() から getMonth() に変更
                 eventStartTime.getDate() === targetDay;         // getUTCDate() から getDate() に変更
        });

        if (targetEvents.length === 0) {
          timelineElement.classList.add('has-placeholder-image');
          timelineElement.style.backgroundImage = 'url(https://i.ibb.co/Lzn1192z/image.png)';
          timelineElement.style.border = 'none'; // 画像表示中は枠線を非表示にする
        } else {
          // イベントがある場合、プレースホルダーを削除
          timelineElement.classList.remove('has-placeholder-image');
          timelineElement.style.backgroundImage = 'none';
          timelineElement.style.border = ''; // 枠線を元に戻す（必要であれば）
        }

        targetEvents.forEach(eventData => {
          const startTime = new Date(eventData.startTime);
          const endTime = new Date(eventData.endTime);

          const start = `${String(startTime.getHours()).padStart(2, '0')}:${String(startTime.getMinutes()).padStart(2, '0')}`;
          const end = `${String(endTime.getHours()).padStart(2, '0')}:${String(endTime.getMinutes()).padStart(2, '0')}`;

          const startMinutes = toMinutes(start);
          const endMinutes = toMinutes(end);
          const duration = endMinutes - startMinutes;

          const calculatedColor = getEventColorByMidpoint(startMinutes, endMinutes);

          const eventDiv = document.createElement("div");
          eventDiv.className = "event";
          eventDiv.style.left = `${(startMinutes / 1440) * 100}%`;
          eventDiv.style.width = `${(duration / 1440) * 100}%`;
          eventDiv.textContent = eventData.name;
          eventDiv.style.backgroundColor = calculatedColor;
          eventDiv.style.borderColor = calculatedColor;

          eventDiv.dataset.id = eventData.id;
          eventDiv.dataset.title = eventData.name;
          eventDiv.dataset.start = start;
          eventDiv.dataset.end = end;
          eventDiv.dataset.color = calculatedColor;
          eventDiv.dataset.userId = loggedInUserId;

          eventDiv.addEventListener('click', function() {
            const eventDetails = `${eventData.name}: ${start}~${end}`;
            eventDetailTextElement.textContent = eventDetails;
            currentEventRefObject.current = eventDiv;
            if (deleteEventBtn) {
              deleteEventBtn.style.display = 'inline-block'; // ボタンの通常の表示スタイルに戻す
            }
            eventDetailModalInstance.show();
          });

          timelineElement.appendChild(eventDiv);
        });

      } else {
        console.error("ログインユーザーのイベント取得失敗:", result.message);
      }
    } catch (error) {
      console.error("ログインユーザーのイベント取得中に通信エラーが発生しました:", error);
    }
  }

  async function fetchAllFollowedUsersFeed(allUserTimelinesContainer, eventDetailModalInstance, eventDetailTextElement, currentEventRefObject, loggedInUserId, targetDate) {
    try {
      const response = await fetch(`${base_url}/api/users/me/feed`, {
        method: "GET",
        headers: { "Content-Type": "application/json" },
        credentials: 'include'
      });

      const result = await response.json();
      allUserTimelinesContainer.innerHTML = '';

      if (result.success && result.data && result.data.userEvents && result.data.userEvents.length > 0) {
        console.log("フォローユーザーのフィード取得成功:", result.data);

        // ターゲット日付の年、月、日を一度だけ取得 (ローカルタイムゾーン基準)
        const targetYear = targetDate.getFullYear();
        const targetMonth = targetDate.getMonth();
        const targetDay = targetDate.getDate();

        result.data.userEvents.forEach(userData => { 
          const userId = userData.user.userId;
          const username = userData.user.name;
          let events = userData.events.events;

          // 各ユーザーのイベントリストをターゲット日付でフィルター
        const targetDayUserEvents = events.filter(eventData => {
            const eventStartTime = new Date(eventData.startTime);
            // イベントの開始時刻がターゲット日付と同じかチェック (ローカルタイムゾーン基準で比較)
            return eventStartTime.getFullYear() === targetYear &&
                   eventStartTime.getMonth() === targetMonth &&
                   eventStartTime.getDate() === targetDay;
        });

          // 以降の処理では、フィルターされた targetDayUserEvents を使用する
          events = targetDayUserEvents;

          const userTimelineSection = document.createElement('div');
          userTimelineSection.classList.add('user-timeline-section', 'mb-4', 'p-3', 'rounded-box');

          const userHeader = document.createElement('h5');
          userHeader.innerHTML = `　<span class="followed-username">${username}</span><span class="san-suffix"> さん</span>`;
          userHeader.classList.add('mb-3', 'ms-2', 'fw-bold');

          const followedUsernameSpan = userHeader.querySelector('.followed-username');
          if (followedUsernameSpan) {
            followedUsernameSpan.title = username; // 元のフルネームをtitle属性に設定
          }

          const userTimelineWrapper = document.createElement('div');
          userTimelineWrapper.classList.add('timeline-wrapper', 'flex-grow-1');

          const userTimelineDiv = document.createElement('div');
          userTimelineDiv.classList.add('timeline');
          
          if (events && events.length > 0) {
            userTimelineDiv.classList.remove('has-placeholder-image');
            userTimelineDiv.style.backgroundImage = 'none';

            events.forEach(eventData => {
              const startTime = new Date(eventData.startTime);
              const endTime = new Date(eventData.endTime);

              const start = `${String(startTime.getHours()).padStart(2, '0')}:${String(startTime.getMinutes()).padStart(2, '0')}`;
              const end = `${String(endTime.getHours()).padStart(2, '0')}:${String(endTime.getMinutes()).padStart(2, '0')}`;

              const startMinutes = toMinutes(start);
              const endMinutes = toMinutes(end);
              const duration = endMinutes - startMinutes;

              const calculatedColor = getEventColorByMidpoint(startMinutes, endMinutes);

              const eventDiv = document.createElement("div");
              eventDiv.className = "event";
              eventDiv.style.left = `${(startMinutes / 1440) * 100}%`;
              eventDiv.style.width = `${(duration / 1440) * 100}%`;
              eventDiv.textContent = eventData.name;
              eventDiv.style.backgroundColor = calculatedColor;
              eventDiv.style.borderColor = calculatedColor;

              eventDiv.dataset.id = eventData.id;
              eventDiv.dataset.title = eventData.name;
              eventDiv.dataset.start = start;
              eventDiv.dataset.end = end;
              eventDiv.dataset.color = calculatedColor;
              eventDiv.dataset.userId = eventData.userId;
              eventDiv.dataset.username = username;

              eventDiv.addEventListener('click', function() {
                const eventDetails = `${eventData.name}: ${start}~${end} (${username}さんのスケジュール)`;
                eventDetailTextElement.textContent = eventDetails;
                currentEventRefObject.current = eventDiv;
                // 削除ボタンを非表示にする
                if (deleteEventBtn) {
                  deleteEventBtn.style.display = 'none';
                }
                eventDetailModalInstance.show();
              });

              userTimelineDiv.appendChild(eventDiv);
            });
          } else {
            userTimelineDiv.classList.add('has-placeholder-image');
            userTimelineDiv.style.backgroundImage = 'url(https://i.ibb.co/Lzn1192z/image.png)';
          }
          
          userTimelineWrapper.appendChild(userTimelineDiv);

          const flexContainer = document.createElement('div');
          flexContainer.classList.add('d-flex', 'align-items-center'); // flexboxを適用
          flexContainer.appendChild(userHeader);      // ユーザー名を追加
          flexContainer.appendChild(userTimelineWrapper); // タイムラインラッパーを追加

          userTimelineSection.appendChild(flexContainer);
          allUserTimelinesContainer.appendChild(userTimelineSection);
        });

      } else {
        console.log("フォローユーザーのイベントは現在ありません。");
      }
    } catch (error) {
      console.error("フォローユーザーのフィード取得中に通信エラーが発生しました:", error);
    }
  }


document.addEventListener('DOMContentLoaded', async () => {
  console.log("DOMContentLoaded fired."); // ログ追加

    // 日付表示用の現在の日付を保持する変数
    let currentDateForDisplay = new Date(); // 初期値は今日の日付

    function updateDateDisplay() {
      const options = { month: 'numeric', day: 'numeric', weekday: 'short' };
      const formattedDate = currentDateForDisplay.toLocaleDateString('ja-JP', options);
      document.getElementById("today-date").textContent = formattedDate;
    }

    // 初期表示
    updateDateDisplay();

    // 「<」ボタンのクリックイベント
    document.getElementById("prev-day-btn").addEventListener("click", async() => {
      currentDateForDisplay.setDate(currentDateForDisplay.getDate() - 1); // 1日前
      updateDateDisplay();
      await fetchMyEvents(loggedInUserId, timeline, eventDetailModal, eventDetailText, currentEventRef, currentDateForDisplay);
      await fetchAllFollowedUsersFeed(allUserTimelinesContainer, eventDetailModal, eventDetailText, currentEventRef, loggedInUserId, currentDateForDisplay);
    });

    // 「>」ボタンのクリックイベント
    document.getElementById("next-day-btn").addEventListener("click", async() => {
      currentDateForDisplay.setDate(currentDateForDisplay.getDate() + 1); // 1日後
      updateDateDisplay();
      await fetchMyEvents(loggedInUserId, timeline, eventDetailModal, eventDetailText, currentEventRef, currentDateForDisplay);
      await fetchAllFollowedUsersFeed(allUserTimelinesContainer, eventDetailModal, eventDetailText, currentEventRef, loggedInUserId, currentDateForDisplay);
    });

  populateTimeOptions('startHour', 'startMinute');
  populateTimeOptions('endHour', 'endMinute');

  const form = document.getElementById("eventForm");
  const timeline = document.getElementById("timeline");
  const allUserTimelinesContainer = document.getElementById('allUserTimelines'); 

  const eventDetailModalElement = document.getElementById('eventDetailModal');
  const eventDetailModal = new bootstrap.Modal(eventDetailModalElement);
  const eventDetailText = document.getElementById('eventDetailText');
  const deleteEventBtn = document.getElementById('deleteEventBtn');
  const colorOptionsContainer = document.getElementById('colorOptions');
  const currentEventRef = { current: null };

  const titleInput = document.getElementById('title');
  const titleInputBubble = document.getElementById('titleInputBubble');
  const closeBubbleBtn = document.getElementById('closeBubbleBtn');
  const rankingCloseBtn = document.querySelector('.btn-close-ranking');
  const presetEventBtns = document.querySelectorAll('.preset-event-btn');
  const logoutButton = document.querySelector('#logout-btn button'); // ログアウトボタンの正確な参照
  const searchButton = document.getElementById('searchButton'); // 検索ボタンの参照

  let selectedPresetType = null;

  const usernameSpan = document.getElementById("username");
  const username = sessionStorage.getItem("username") || "ゲスト";
  usernameSpan.textContent = username;
  const loggedInUserId = sessionStorage.getItem("currentUserId") || "dummyUserId123";

  if (!loggedInUserId) {
    console.warn("ログインユーザーIDがsessionStorageに見つかりません。これはテスト環境でのみ許容されます。本番環境ではログインページへリダイレクトするなど適切な処理が必要です。");
    // window.location.href = 'TimeShare_WelcomePage.html'; 
    // return; // テストのためにコメントアウト
  }

  // 初期イベント読み込み
  await fetchMyEvents(loggedInUserId, timeline, eventDetailModal, eventDetailText, currentEventRef, currentDateForDisplay);
  await fetchAllFollowedUsersFeed(allUserTimelinesContainer, eventDetailModal, eventDetailText, currentEventRef, loggedInUserId, currentDateForDisplay);

  // イベント追加フォームの送信イベント
  if (form) { // nullチェック
    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      const title = titleInput.value;
      const startHour = document.getElementById("startHour").value;
      const startMinute = document.getElementById("startMinute").value;
      const endHour = document.getElementById("endHour").value;
      const endMinute = document.getElementById("endMinute").value;

      const start = `${startHour}:${startMinute}`;
      const end = `${endHour}:${endMinute}`;

      const startMinutes = toMinutes(start);
      const endMinutes = toMinutes(end);
      const duration = endMinutes - startMinutes;

      if (duration <= 0) {
        alert("終了時刻は開始時刻より後に設定してください。");
        return;
      }

      const existingEvents = timeline.querySelectorAll('.event');
      let overlap = false;

      for (const existingEventDiv of existingEvents) {
        if (existingEventDiv.dataset.userId === loggedInUserId) {
            const existingStart = existingEventDiv.dataset.start;
            const existingEnd = existingEventDiv.dataset.end;

            const existingStartMinutes = toMinutes(existingStart);
            const existingEndMinutes = toMinutes(existingEnd);

            if ((startMinutes < existingEndMinutes) && (endMinutes > existingStartMinutes)) {
                overlap = true;
                alert(`このイベントは既存のイベント「${existingEventDiv.dataset.title}」（${existingStart}〜${existingEnd}）と時間が重複しています。`);
                break;
            }
        }
      }
      if (overlap) {
        return;
      }

      const today = new Date(currentDateForDisplay); // 表示している日付（currentDateForDisplay）を基準にする
      const year = today.getFullYear();
      const month = today.getMonth();
      const day = today.getDate();

      const startTime = new Date( // Date.UTC() を削除
        year,
        month,
        day,
        parseInt(startHour, 10),
        parseInt(startMinute, 10),
        0
      );
      const startTimeISO = startTime.toISOString();

      const endTime = new Date(
        year,
        month,
        day,
        parseInt(endHour, 10),
        parseInt(endMinute, 10),
        0
      );
      const endTimeISO = endTime.toISOString();

      const payload = {
        "name": title,
        "startTime": startTimeISO,
        "endTime": endTimeISO
      };

      if (selectedPresetType) {
          payload.type = selectedPresetType;
      }

      try {
        const res = await fetch(base_url + "/api/events", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          credentials: 'include'
        });

        const result = await res.json();

        if (result.success) {
          console.log("イベントが正常に作成されました:", result.data);

          if (timeline.classList.contains('has-placeholder-image')) {
            timeline.classList.remove('has-placeholder-image');
            timeline.style.backgroundImage = 'none';
          }

          const calculatedColor = getEventColorByMidpoint(startMinutes, endMinutes);

          const startPercent = (startMinutes / 1440) * 100;
          const widthPercent = (duration / 1440) * 100;

          const eventDiv = document.createElement("div");
          eventDiv.className = "event";
          eventDiv.style.left = `${startPercent}%`;
          eventDiv.style.width = `${widthPercent}%`;
          eventDiv.textContent = title;
          eventDiv.style.backgroundColor = calculatedColor;
          eventDiv.style.borderColor = calculatedColor;

          eventDiv.dataset.id = result.data.id;
          eventDiv.dataset.title = title;
          eventDiv.dataset.start = start;
          eventDiv.dataset.end = end;
          eventDiv.dataset.color = calculatedColor;
          eventDiv.dataset.userId = loggedInUserId;

          if (selectedPresetType) {
              eventDiv.dataset.type = selectedPresetType;
          }

          eventDiv.addEventListener('click', function() {
            const eventDetails = `${title}: ${start}~${end}`;
            eventDetailText.textContent = eventDetails;
            currentEventRef.current = eventDiv;
            eventDetailModal.show();
          });

          timeline.appendChild(eventDiv);
          form.reset();
          
          selectedPresetType = null;
          titleInput.disabled = false; // フォームリセット時に入力欄を有効に戻す
        } else {
          alert(`イベント作成に失敗しました: ${result.message}`);
          console.error("イベント作成失敗:", result.message);
        }
      } catch (err) {
        console.error("通信エラーが発生しました:", err);
        alert("イベント作成中にエラーが発生しました。ネットワーク接続を確認してください。");
      }
    });
  } else {
    console.error("Error: eventForm element not found.");
  }


  // モーダルの削除ボタン処理
  if (deleteEventBtn) { // nullチェック
    deleteEventBtn.addEventListener('click', async function() {
      if (currentEventRef.current) {
        const eventId = currentEventRef.current.dataset.id;
        const eventUserId = currentEventRef.current.dataset.userId;

        if (!eventId) {
          alert("イベントIDが見つかりません。削除できません。");
          return;
        }

        if (eventUserId !== loggedInUserId) {
          alert("他のユーザーのイベントは削除できません。");
          return;
        }

        try {
          const res = await fetch(`${base_url}/api/events/${eventId}`, {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            credentials: 'include'
          });

          const result = await res.json();

          if (res.ok && result.success) {
            console.log("イベントが正常に削除されました:", result.message);
            currentEventRef.current.remove();
            eventDetailModal.hide();

            if (timeline.children.length === 0) {
              timeline.classList.add('has-placeholder-image');
              timeline.style.backgroundImage = 'url(https://i.ibb.co/Lzn1192z/image.png)';
            }
            currentEventRef.current = null;
          } else {
            alert(`イベント削除に失敗しました: ${result.message || '不明なエラー'}`);
            console.error("イベント削除失敗:", result.message);
          }
        } catch (err) {
          console.error("イベント削除中にネットワークエラーが発生しました:", err);
          alert("イベント削除中にエラーが発生しました。インターネット接続を確認してください。");
        }
      }
    });
  } else {
    console.error("Error: deleteEventBtn element not found.");
  }


  // タイムラインにおけるイベントの背景色を変更する
  if (colorOptionsContainer) { // nullチェック
    colorOptionsContainer.addEventListener('click', function(event) {
      const clickedButton = event.target.closest('.color-option');
      if (clickedButton && currentEventRef.current) {
        const selectedColor = clickedButton.dataset.color;
        currentEventRef.current.style.backgroundColor = selectedColor;
        currentEventRef.current.style.borderColor = selectedColor;
        currentEventRef.current.dataset.color = selectedColor;
      }
    });
  } else {
    console.error("Error: colorOptionsContainer element not found.");
  }

  // ログアウトボタンがクリックされた時に実行される処理
  if (logoutButton) { // nullチェック
    logoutButton.addEventListener('click', function() {
      console.log("Logout button clicked."); // ログ追加
      fetch(base_url + "/api/auth/logout", {
        method: 'POST',
        credentials: 'include'
      })
        .then(response => {
          console.log("Logout response received.", response); // ログ追加
          return response.json();
        })
        .then(data => {
          if (data.success) {
            console.log("Logout successful, redirecting."); // ログ追加
            window.location.href = 'TimeShare_WelcomePage.html';
          } else {
            alert('ログアウトに失敗しました');
            console.error("Logout failed:", data.message); // ログ追加
          }
        })
        .catch(error => {
          console.error('ログアウト中にエラーが発生しました:', error);
          alert('ログアウトに失敗しました。再度試してください。');
        });
    });
  } else {
    console.error("Error: logoutButton element not found.");
  }


// 新しいカラーピッカー要素を取得
const customColorPickerInput = document.getElementById('customColorPicker');

if (customColorPickerInput) {
  customColorPickerInput.addEventListener('input', function() {
    // ユーザーが色を選択したら、その色を現在のイベントに適用
    if (currentEventRef.current) {
      const selectedColor = customColorPickerInput.value;
      currentEventRef.current.style.backgroundColor = selectedColor;
      currentEventRef.current.style.borderColor = selectedColor;
      currentEventRef.current.dataset.color = selectedColor;

      // 色を変更したら、モーダルを閉じずにカラーピッカーのUIを閉じる (ブラウザのデフォルト挙動)
    }
  });

  // モーダルが閉じられた時の処理は、この要素には影響しないので特に変更不要です
  // eventDetailModalElement.addEventListener('hidden.bs.modal', function () {
  //   // ここはcustomColorPickerInputのdisplayを操作する必要はありません
  // });

} else {
  console.error("Error: customColorPickerInput element not found.");
}


  // --- 吹き出し関連のコード ---
  if (titleInput) { // nullチェック
    titleInput.addEventListener('focus', function() {
      if (titleInput.disabled) {
        return;
      }
      const inputRect = titleInput.getBoundingClientRect();
      const formRect = form.getBoundingClientRect(); 

      titleInputBubble.style.left = `${inputRect.left + (inputRect.width / 2) - formRect.left}px`;
      titleInputBubble.style.top = `${inputRect.bottom - formRect.top + 10}px`;
      titleInputBubble.style.display = 'block';
    });
  } else {
    console.error("Error: titleInput element not found.");
  }

  if (closeBubbleBtn) { // nullチェック
    closeBubbleBtn.addEventListener('click', function(event) {
      event.preventDefault();
      titleInputBubble.style.display = 'none';
    });
  } else {
    console.error("Error: closeBubbleBtn element not found.");
  }

  if (rankingCloseBtn) { // nullチェック
    rankingCloseBtn.addEventListener('click', function() {
      titleInputBubble.style.display = 'none';
    });
  } else {
    console.error("Error: rankingCloseBtn element not found.");
  }

  if (presetEventBtns.length > 0) { // nullチェック
    presetEventBtns.forEach(button => {
      button.addEventListener('click', function() {
        const eventName = this.dataset.eventName;
        titleInput.value = eventName;
        titleInput.disabled = true;
        titleInputBubble.style.display = 'none';

        if (eventName === "食事") {
          selectedPresetType = "meal";
        } else if (eventName === "睡眠") {
          selectedPresetType = "sleep";
        } else if (eventName === "仕事") {
          selectedPresetType = "work";
        } else if (eventName === "運動") {
          selectedPresetType = "exercise";
        }else if (eventName === "勉強") {
          selectedPresetType = "study";
        }else {
          selectedPresetType = null;
        }
      });
    });
  } else {
    console.warn("Warning: No presetEventBtns found.");
  }

  document.addEventListener('click', function(event) {
    if (titleInput && titleInputBubble && form) { // 関連要素のnullチェック
      if (event.target !== titleInput && !titleInputBubble.contains(event.target) && !form.contains(event.target)) {
        titleInputBubble.style.display = 'none';
      }
    }
  });

  if (form) { // nullチェック
    form.addEventListener('reset', function() {
      if (titleInputBubble) titleInputBubble.style.display = 'none';
      if (titleInput) titleInput.disabled = false; 
      selectedPresetType = null;
    });
  }


  //検索ボタンがクリックされた時に実行される処理
  if (searchButton) { // nullチェック
    searchButton.addEventListener('click', function(){
      console.log("Search button clicked, redirecting to search.html."); // ログ追加
      window.location.href = 'search.html';
    });
  } else {
    console.error("Error: searchButton element not found.");
  }
  //ランキングボタンがクリックされた時に実行される処理
  if (rankingButton) { // nullチェック
    rankingButton.addEventListener('click', function(){
      console.log("Ranking button clicked, redirecting to ranking.html."); // ログ追加
      window.location.href = 'ranking.html';
    });
  } else {
    console.error("Error: rankingButton element not found.");
  }

});
